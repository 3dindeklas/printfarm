# File with shared gcode macro commands

[gcode_arcs]
#resolution: 1.0

[pause_resume]

[gcode_macro PAUSE]
description: Pause the actual running print
rename_existing: PAUSE_BASE
# change this if you need more or less extrusion
variable_extrude: 1.0
gcode:
  ##### read E from pause macro #####
  {% set E = printer["gcode_macro PAUSE"].extrude|float %}
  ##### set park positon for x and y #####
  # default is your max posion from your printer.cfg
  {% set x_park = printer.toolhead.axis_maximum.x|float - 5.0 %}
  {% set y_park = printer.toolhead.axis_maximum.y|float - 5.0 %}
  ##### calculate save lift position #####
  {% set max_z = printer.toolhead.axis_maximum.z|float %}
  {% set act_z = printer.toolhead.position.z|float %}
  {% if act_z < (max_z - 2.0) %}
      {% set z_safe = 2.0 %}
  {% else %}
      {% set z_safe = max_z - act_z %}
  {% endif %}
  ##### end of definitions #####
  PAUSE_BASE
  G91
  {% if printer.extruder.can_extrude|lower == 'true' %}
    G1 E-{E} F2100
  {% else %}
    {action_respond_info("Extruder not hot enough")}
  {% endif %}
  {% if "xyz" in printer.toolhead.homed_axes %}
    G1 Z{z_safe} F900
    G90
    G1 X{x_park} Y{y_park} F6000
  {% else %}
    {action_respond_info("Printer not homed")}
  {% endif %}

[gcode_macro RESUME]
description: Resume the actual running print
rename_existing: RESUME_BASE
gcode:
  ##### read E from pause macro #####
  {% set E = printer["gcode_macro PAUSE"].extrude|float %}
  #### get VELOCITY parameter if specified ####
  {% if 'VELOCITY' in params|upper %}
    {% set get_params = ('VELOCITY=' + params.VELOCITY)  %}
  {%else %}
    {% set get_params = "" %}
  {% endif %}
  ##### end of definitions #####
  {% if printer.extruder.can_extrude|lower == 'true' %}
    G91
    G1 E{E} F2100
  {% else %}
    {action_respond_info("Extruder not hot enough")}
  {% endif %}  
  RESUME_BASE {get_params}

[gcode_macro CANCEL_PRINT]
description: Cancel the actual running print
rename_existing: CANCEL_PRINT_BASE
gcode:
  TURN_OFF_HEATERS
  CANCEL_PRINT_BASE

######################################################################
# Bed Mesh Calibrate
######################################################################
# G29: Bed Mesh Calibrate. This macro will home the printer, run the bed mesh 

[gcode_macro G29]
description: Home and calibrate bed mesh, then move to a safe position
gcode:
  G28
  BED_MESH_CALIBRATE
  G1 X0 Y0 Z10 F4200
  SAVE_CONFIG

######################################################################
# Start Print and End Print
######################################################################

# Replace the slicer's custom start and end g-code scripts with
# START_PRINT and END_PRINT. See docs/Slicers.md for more information on using these macros.

[gcode_macro START_PRINT]
description: Professional start macro for Ender 3 S1 Pro (Sprite Direct Drive)
# Usage in slicer:
# START_PRINT BED=60 EXTRUDER=210 MESH=0
#
# Parameters:
# BED       = Bed temperature
# EXTRUDER  = Nozzle temperature
# MESH=0    = Load existing mesh (default, fast)
# MESH=1    = Recalibrate and save new mesh (slow)

variable_bed_temp: 60
variable_extruder_temp: 200

gcode:
  # -----------------------------
  # Read parameters from slicer
  # -----------------------------
  {% set bed = params.BED|default(printer["gcode_macro START_PRINT"].bed_temp)|float %}
  {% set hotend = params.EXTRUDER|default(printer["gcode_macro START_PRINT"].extruder_temp)|float %}
  {% set do_mesh = params.MESH|default(0)|int %}

  # -----------------------------
  # Initial setup
  # -----------------------------
  G90                             ; Use absolute positioning
  M83                             ; Set extruder to relative mode
  G92 E0                          ; Reset extruder position

  # -----------------------------
  # Heat bed first for stability
  # -----------------------------
  M140 S{bed}                     ; Set bed temperature (do not wait)
  M104 S160                       ; Preheat nozzle to 160C (reduces oozing during probing)
  M190 S{bed}                     ; Wait for bed to reach target temperature

  # -----------------------------
  # Home printer
  # -----------------------------
  G28                             ; Home all axes

  # -----------------------------
  # Bed mesh handling
  # -----------------------------
  {% if do_mesh == 1 %}
      BED_MESH_CLEAR              ; Clear any existing mesh
      BED_MESH_CALIBRATE          ; Perform new mesh calibration
      BED_MESH_PROFILE SAVE=default ; Save mesh as default profile
  {% else %}
      BED_MESH_PROFILE LOAD=default ; Load previously saved mesh
  {% endif %}

  # -----------------------------
  # Heat nozzle to final print temperature
  # -----------------------------
  M109 S{hotend}                  ; Wait for nozzle to reach print temperature

  # -----------------------------
  # Purge line sequence
  # -----------------------------
  G1 Z2.0 F3000                   ; Lift nozzle to safe height
  G1 X2.0 Y10 F5000               ; Move to purge start position
  G1 Z0.28 F240                   ; Move to first layer height

  G92 E0                          ; Reset extruder position
  G1 X2.0 Y140 E10 F1500          ; Draw first purge line while extruding
  G1 X2.3 Y140 F5000              ; Small sideways move
  G92 E0                          ; Reset extruder
  G1 X2.3 Y10 E10 F1200           ; Draw second purge line
  G92 E0                          ; Final extruder reset

  # -----------------------------
  # Move to safe standby position
  # -----------------------------
  G1 Z2.0 F3000                   ; Lift nozzle before moving
  G1 X10 Y10 F5000                ; Park near front-left corner

  # -----------------------------
  # Print starts after this point
  # -----------------------------
  ; Printing begins
  
[gcode_macro END_PRINT]
description: Professional end macro - retract, park, cool down, and disable motors safely
# Usage in slicer:
# END_PRINT
#
# Notes:
# - Retracts a bit to reduce stringing/ooze
# - Lifts Z to avoid part collision
# - Parks the toolhead at the back/side
# - Turns off heaters and fan
# - Optionally clears bed mesh (commented out)

gcode:
  # -----------------------------
  # Save state (optional safety)
  # -----------------------------
  SAVE_GCODE_STATE NAME=END_STATE

  # -----------------------------
  # Stop extrusion pressure / retract
  # -----------------------------
  M83                             ; Ensure extruder is in relative mode
  G92 E0                          ; Reset extruder position
  G1 E-2.0 F1800                  ; Retract 2mm to reduce oozing

  # -----------------------------
  # Lift Z to avoid hitting the print
  # -----------------------------
  {% set z_safe = 10.0 %}
  {% set z_now = printer.toolhead.position.z %}
  {% set z_max = printer.toolhead.axis_maximum.z %}
  {% set z_target = (z_now + z_safe) if (z_now + z_safe) < z_max else z_max %}
  G1 Z{z_target} F3000            ; Lift Z (clamped to Z max)

  # -----------------------------
  # Park toolhead
  # -----------------------------
  {% set x_park = printer.toolhead.axis_maximum.x - 5 %}
  {% set y_park = printer.toolhead.axis_maximum.y - 5 %}
  G1 X{x_park} Y{y_park} F6000    ; Move to back-right corner (safe park)

  # -----------------------------
  # Turn off heaters and fan
  # -----------------------------
  M104 S0                         ; Hotend off
  M140 S0                         ; Bed off
  M106 S0                         ; Part cooling fan off

  # -----------------------------
  # Optional: clear mesh after print
  # -----------------------------
  # BED_MESH_CLEAR                ; Uncomment if you prefer clearing mesh after each print

  # -----------------------------
  # Disable steppers (optional)
  # -----------------------------
  M84                             ; Disable motors

  # -----------------------------
  # Restore state
  # -----------------------------
  RESTORE_GCODE_STATE NAME=END_STATE

######################################################################
# Filament Change
######################################################################

# M600: Filament Change. This macro will pause the printer, move the
# tool to the change position, and retract the filament 50mm. Adjust
# the retraction settings for your own extruder. After filament has
# been changed, the print can be resumed from its previous position
# with the "RESUME" gcode.

[gcode_macro M600]
gcode:
    SET_IDLE_TIMEOUT TIMEOUT=7200 ; Increase idle timeout during filament change
    {% set X = params.X|default(50)|float %}
    {% set Y = params.Y|default(0)|float %}
    {% set Z = params.Z|default(10)|float %}
    SAVE_GCODE_STATE NAME=M600_state
    PAUSE
    G91
    G1 E-.8 F2700
    G1 Z{Z}
    G90
    G1 X{X} Y{Y} F3000
    G91
    G1 E-50 F1000
    SET_IDLE_TIMEOUT TIMEOUT=900 ; Return idle timeout to normal
    RESTORE_GCODE_STATE NAME=M600_state


[gcode_macro PREHEAT_PLA]
description: preheating PLA to bed 60 and heater 200
gcode:
    # Set Bed Temperature
    SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET=60
    # Set Nozzle Temperature
    SET_HEATER_TEMPERATURE HEATER=extruder TARGET=200
    # Optional: Wait for temperatures to reach target
    # TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM=60
    # TEMPERATURE_WAIT SENSOR=extruder MINIMUM=170
    M117 PLA Preheating...


# Cancel object (aka Marlin/RRF M486 commands) support
# 
# Enable object exclusion
[exclude_object]

[gcode_macro M486]
gcode:
  # Parameters known to M486 are as follows:
  #   [C<flag>] Cancel the current object
  #   [P<index>] Cancel the object with the given index
  #   [S<index>] Set the index of the current object.
  #       If the object with the given index has been canceled, this will cause
  #       the firmware to skip to the next object. The value -1 is used to
  #       indicate something that isn’t an object and shouldn’t be skipped.
  #   [T<count>] Reset the state and set the number of objects
  #   [U<index>] Un-cancel the object with the given index. This command will be
  #       ignored if the object has already been skipped

  {% if 'exclude_object' not in printer %}
    {action_raise_error("[exclude_object] is not enabled")}
  {% endif %}

  {% if 'T' in params %}
    EXCLUDE_OBJECT RESET=1

    {% for i in range(params.T | int) %}
      EXCLUDE_OBJECT_DEFINE NAME={i}
    {% endfor %}
  {% endif %}

  {% if 'C' in params %}
    EXCLUDE_OBJECT CURRENT=1
  {% endif %}

  {% if 'P' in params %}
    EXCLUDE_OBJECT NAME={params.P}
  {% endif %}

  {% if 'S' in params %}
    {% if params.S == '-1' %}
      {% if printer.exclude_object.current_object %}
        EXCLUDE_OBJECT_END NAME={printer.exclude_object.current_object}
      {% endif %}
    {% else %}
      EXCLUDE_OBJECT_START NAME={params.S}
    {% endif %}
  {% endif %}

  {% if 'U' in params %}
    EXCLUDE_OBJECT RESET=1 NAME={params.U}
  {% endif %}